name: Build

# Buduje paczkę (debug APK) aplikacji Mealspire na GitHubie oraz uruchamia
# szybkie testy jednostkowe JVM przy każdym pushu i pull requeście.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Build debug APK package
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mealspire-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
